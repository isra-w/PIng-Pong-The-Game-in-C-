name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Setup .NET and use the cache for dependencies
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore
        # working-directory: ./your-solution-folder   # Uncomment and set if not root

      # Build solution
      - name: Build
        run: dotnet build --no-restore --verbosity diag
        # working-directory: ./your-solution-folder   # Uncomment and set if not root

      # Run tests (skip if no tests, or mark continue-on-error: true)
      - name: Test
        run: dotnet test --no-build --verbosity normal
        # working-directory: ./your-solution-folder   # Uncomment and set if not root
        continue-on-error: true  # Remove if you want workflow to stop on test failures
